spring.application.name=cinema-reservas
server.port=8080

# Banco de dados
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT
jwt.secret=${JWT_SECRET:cinema-reservas-chave-secreta-deve-ter-pelo-menos-256-bits-de-tamanho-longa}
jwt.expiration=86400000

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Admin padrão (criado automaticamente na primeira execução)
admin.email=${ADMIN_EMAIL:admin@cinema.com}
admin.senha=${ADMIN_SENHA:Admin@123}

# AWS S3
aws.region=${AWS_REGION}
aws.accessKeyId=${AWS_ACCESS_KEY_ID}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY}
aws.sessionToken=${AWS_SESSION_TOKEN}
aws.s3.bucket=${S3_BUCKET_NAME}

# Upload de arquivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
